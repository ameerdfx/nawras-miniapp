<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المتجر الذكي - Mini Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- استدعاء مكتبة تليجرام الأساسية لقراءة بيانات الزبون تلقائياً -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen pb-24">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-xs">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-xl shadow-md shadow-indigo-100">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-gray-900">المتجر الإلكتروني</h1>
            </div>
            <button onclick="scrollToCart()" class="relative p-2 text-gray-600 hover:text-indigo-600 transition-colors">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-rose-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </header>

    <!-- شريط ترحيبي بالزبون للتأكد من التعرف على هويته بنجاح -->
    <div id="welcome-bar" class="bg-indigo-50 text-indigo-800 px-4 py-2 text-sm text-center font-medium hidden">
        👋 مرحباً بك <span id="customer-name-display" class="font-bold"></span>، تسوق ممتع!
    </div>

    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-8">
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-store text-indigo-600 text-lg"></i>
                    <h2 class="text-lg font-bold text-gray-950">المتاجر المتاحة</h2>
                </div>
                <div id="stores" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                    <div class="col-span-full py-8 text-center text-gray-400">
                        <i class="fa-solid fa-spinner animate-spin text-2xl mb-2"></i>
                        <p>جاري تحميل المتاجر...</p>
                    </div>
                </div>
            </section>

            <section id="products-section" class="hidden">
                <div class="flex items-center justify-between mb-4 border-t border-gray-100 pt-6">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-boxes-stacked text-indigo-600 text-lg"></i>
                        <h2 class="text-lg font-bold text-gray-950">المنتجات المعروضة</h2>
                    </div>
                    <span id="selected-store-name" class="text-xs bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full font-medium"></span>
                </div>
                <div id="products" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </section>
        </div>

        <div class="lg:col-span-1">
            <div id="cart-card" class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm sticky top-24">
                <div class="flex items-center gap-2 mb-4 pb-4 border-b border-gray-50">
                    <i class="fa-solid fa-basket-shopping text-indigo-600 text-lg"></i>
                    <h2 class="text-lg font-bold text-gray-950">سلة المشتريات</h2>
                </div>

                <div id="cart" class="space-y-4 max-h-[350px] overflow-y-auto pr-1">
                    <div class="text-center py-8 text-gray-400">
                        <i class="fa-solid fa-basket-shopping text-3xl mb-2 block text-gray-300"></i>
                        <p class="text-sm">السلة فارغة حالياً، أضف بعض المنتجات!</p>
                    </div>
                </div>

                <div class="border-t border-gray-100 mt-6 pt-4 space-y-3">
                    <div class="flex justify-between items-center text-gray-600">
                        <span>إجمالي المنتجات:</span>
                        <span id="total-items" class="font-medium text-gray-900">0</span>
                    </div>
                    <div class="flex justify-between items-center text-lg font-bold text-gray-900 pt-2 border-t border-dashed border-gray-100">
                        <span>المجموع الكلي:</span>
                        <span class="text-indigo-600"><span id="total-price">0</span> د.ع</span>
                    </div>
                </div>

                <button onclick="checkout()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-indigo-100 transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer active:scale-[0.98]">
                    <i class="fa-solid fa-circle-check"></i>
                    <span>إتمام وتأكيد الطلب</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        // =====================
        // 1. CONFIG
        // =====================
        const supabaseUrl = "https://lfpzrppdaoiedwabpqjl.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmcHpycHBkYW9pZWR3YWJwcWpsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDMzODcwOCwiZXhwIjoyMDk1OTE0NzA4fQ.EkgD-Zz4HHABNLOYtNxJr6U2BeolQhIOojEQiiVStaQ";
        
        const botToken = "8579415183:AAFDcnlUeo7iUABt5vOW7yGF5dny8FiN4bM";
        const chatId = "5503702576"; // معرف لوحة التحكم الخاصة بك لاستلام جميع الإشعارات

        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        // =====================
        // 2. STATE & TELEGRAM USER
        // =====================
        let stores = [];
        let products = [];
        let cart = [];
        let selectedMerchant = null;

        // قراءة بيانات تليجرام الفريدة الخاصة بالزبون الحالي
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand(); // تمديد الشاشة لتغطية واجهة تليجرام بالكامل بالمتجر
        }
        
        const customerId = tg?.initDataUnsafe?.user?.id || "مجهول_أو_متصفح_خارجي";
        const customerName = tg?.initDataUnsafe?.user?.first_name || "زبون خارجي";
        const customerUsername = tg?.initDataUnsafe?.user?.username ? `@${tg.initDataUnsafe.user.username}` : "لا يوجد معرف";

        // عرض شريط الترحيب إذا كان الدخول من التليجرام
        if(tg?.initDataUnsafe?.user) {
            document.getElementById('welcome-bar').classList.remove('hidden');
            document.getElementById('customer-name-display').innerText = customerName;
        }

        // =====================
        // 3. LOAD STORES
        // =====================
        async function loadStores(){
            let { data, error } = await db
                .from('merchants')
                .select('*')
                .eq('is_open', true);

            stores = data || [];
            
            const storesContainer = document.getElementById('stores');
            if(stores.length === 0) {
                storesContainer.innerHTML = `<div class="col-span-full py-6 text-center text-gray-500">لا توجد متاجر مفتوحة حالياً.</div>`;
                return;
            }

            storesContainer.innerHTML = stores.map(s => `
                <div onclick="openStore('${s.id}', '${s.store_name}')" id="store-${s.id}" class="store-card bg-white p-4 border border-gray-100 rounded-xl text-center shadow-xs cursor-pointer hover:shadow-md hover:border-indigo-200 transition-all duration-200 flex flex-col items-center gap-3 group">
                    <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-lg group-hover:bg-indigo-600 group-hover:text-white transition-all">
                        <i class="fa-solid fa-store"></i>
                    </div>
                    <span class="font-semibold text-gray-800 text-sm sm:text-base">${s.store_name}</span>
                </div>
            `).join('');
        }

        // =====================
        // 4. OPEN STORE
        // =====================
        async function openStore(id, storeName){
            selectedMerchant = id;
            
            document.querySelectorAll('.store-card').forEach(c => c.classList.remove('border-indigo-600', 'bg-indigo-50/30'));
            const selectedCard = document.getElementById(`store-${id}`);
            if(selectedCard) selectedCard.classList.add('border-indigo-600', 'bg-indigo-50/30');

            document.getElementById('products-section').classList.remove('hidden');
            document.getElementById('selected-store-name').innerText = storeName;
            
            const productsContainer = document.getElementById('products');
            productsContainer.innerHTML = `
                <div class="col-span-full py-6 text-center text-gray-400">
                    <i class="fa-solid fa-spinner animate-spin text-xl"></i> جاري تحميل المنتجات...
                </div>`;

            let { data } = await db
                .from('products')
                .select('*')
                .eq('merchant_id', id)
                .eq('is_available', true);

            products = data || [];

            if(products.length === 0) {
                productsContainer.innerHTML = `<div class="col-span-full py-6 text-center text-gray-500">لا توجد منتجات متاحة في هذا المتجر.</div>`;
                return;
            }

            productsContainer.innerHTML = products.map(p => `
                <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-xs flex flex-col justify-between hover:shadow-md transition-all">
                    <div class="flex gap-4 items-start">
                        <div class="w-16 h-16 bg-gray-50 border border-gray-100 rounded-lg flex items-center justify-center text-gray-300 text-2xl shrink-0">
                            <i class="fa-solid fa-image"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-900 mb-1">${p.name}</h4>
                            <span class="text-sm font-semibold text-emerald-600">${p.price.toLocaleString()} د.ع</span>
                        </div>
                    </div>
                    <button onclick="addToCart('${p.id}','${p.name}',${p.price})" class="w-full mt-4 bg-gray-900 hover:bg-indigo-600 text-white text-xs font-semibold py-2.5 px-3 rounded-lg transition-colors duration-150 flex items-center justify-center gap-1.5 cursor-pointer">
                        <i class="fa-solid fa-plus text-[10px]"></i> إضافة للسلة
                    </button>
                </div>
            `).join('');

            if(window.innerWidth < 1024) {
                document.getElementById('products-section').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // =====================
        // 5. CART SYSTEM
        // =====================
        function addToCart(id, name, price){
            let item = cart.find(x => x.id === id);
            if(item) item.qty++;
            else cart.push({id, name, price, qty: 1});
            renderCart();
        }

        function changeQty(id, change) {
            let item = cart.find(x => x.id === id);
            if(item) {
                item.qty += change;
                if(item.qty <= 0) cart = cart.filter(x => x.id !== id);
            }
            renderCart();
        }

        function renderCart(){
            const cartContainer = document.getElementById('cart');
            const totalItemsEl = document.getElementById('total-items');
            const totalPriceEl = document.getElementById('total-price');
            const cartCountBadge = document.getElementById('cart-count');

            const totalItems = cart.reduce((a, b) => a + b.qty, 0);
            const totalPrice = cart.reduce((a, b) => a + b.price * b.qty, 0);

            totalItemsEl.innerText = totalItems;
            totalPriceEl.innerText = totalPrice.toLocaleString();
            
            if(totalItems > 0) {
                cartCountBadge.innerText = totalItems;
                cartCountBadge.classList.remove('hidden');
            } else {
                cartCountBadge.classList.add('hidden');
            }

            if(cart.length === 0) {
                cartContainer.innerHTML = `
                    <div class="text-center py-8 text-gray-400">
                        <i class="fa-solid fa-basket-shopping text-3xl mb-2 block text-gray-300"></i>
                        <p class="text-sm">السلة فارغة حالياً</p>
                    </div>`;
                return;
            }

            cartContainer.innerHTML = cart.map(c => `
                <div class="flex justify-between items-center bg-gray-50/50 p-3 rounded-xl border border-gray-100">
                    <div class="space-y-0.5">
                        <h5 class="font-bold text-gray-900 text-sm">${c.name}</h5>
                        <p class="text-xs text-gray-500">${(c.price * c.qty).toLocaleString()} د.ع</p>
                    </div>
                    <div class="flex items-center gap-2 border border-gray-200 bg-white rounded-lg p-1">
                        <button onclick="changeQty('${c.id}', 1)" class="w-6 h-6 rounded-md hover:bg-gray-100 flex items-center justify-center text-xs text-gray-600 cursor-pointer"><i class="fa-solid fa-plus"></i></button>
                        <span class="text-sm font-bold text-gray-800 px-1 w-4 text-center">${c.qty}</span>
                        <button onclick="changeQty('${c.id}', -1)" class="w-6 h-6 rounded-md hover:bg-gray-100 flex items-center justify-center text-xs text-gray-600 cursor-pointer"><i class="fa-solid fa-minus"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function scrollToCart() {
            document.getElementById('cart-card').scrollIntoView({ behavior: 'smooth' });
        }

        // =====================
        // 6. CHECKOUT
        // =====================
        async function checkout(){
            if(cart.length === 0) return alert("⚠️ السلة فارغة حالياً، يرجى إضافة منتجات أولاً.");

            const total = cart.reduce((a, b) => a + b.price * b.qty, 0);
            
            const orderItems = cart.map(i => ({
                name: i.name,
                qty: i.qty,
                total: i.price * i.qty
            }));

            try {
                // إرسال البيانات للـ Telegram API متضمنة هوية الزبون
                await sendToTelegram(orderItems, total);
                
                // تفريغ السلة وتحديث الواجهة
                cart = [];
                renderCart();

                alert("✅ تم إرسال طلبك بنجاح للوحة التحكم!");
                
                // إذا كان بداخل تطبيق تليجرام، نغلق الـ WebApp تلقائياً ليعود العميل للمحادثة
                if(tg) {
                    tg.close();
                } else {
                    window.location.href = "https://t.me/saei_customer_bot";
                }
                
            } catch (error) {
                console.error(error);
                alert("❌ فشل إرسال الطلب، تأكد من اتصالك بالإنترنت.");
            }
        }

        // =====================
        // 7. TELEGRAM API SEND FUNCTION (WITH CUSTOMER IDENTIFICATION)
        // =====================
        async function sendToTelegram(orderItems, total){
            const currentStore = stores.find(s => s.id === selectedMerchant);
            const storeName = currentStore ? currentStore.store_name : "متجر غير معروف";

            // بناء نص رسالة احترافي يحتوي على كافة بيانات المطابقة
            let text = `🛍️ *طلب جديد من المتجر الإلكتروني* \n\n`;
            
            text += `🏪 *المتجر المختار:* \`${storeName}\` \n`;
            text += `👤 *اسم الزبون:* ${customerName} \n`;
            text += ` Username * 🌐:* ${customerUsername} \n`;
            text += `🆔 *ID الزبون الفريد:* \`${customerId}\` \n`; // هذا يضمن التمييز المطلق بين المستخدمين
            text += `--- \n\n`;

            text += `📦 *تفاصيل المنتجات:* \n`;
            orderItems.forEach((i, index) => {
                text += `${index + 1}. ${i.name} × ${i.qty} = ${i.total.toLocaleString()} د.ع\n`;
            });
            
            text += `\n💰 *المجموع الكلي للطلب:* ${total.toLocaleString()} د.ع \n\n`;
            text += `🤖 أُرسل بواسطة المساعد الذكي لـ @saei_customer_bot`;

            // إرسال الرسالة إلى معرف الآيدي الخاص بك (لوحة التحكم الخاصة بالنظام)
            const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: chatId, 
                    text: text,
                    parse_mode: "Markdown"
                })
            });

            if (!response.ok) {
                throw new Error("فشل الاتصال بخادم تليجرام");
            }
        }

        // تشغيل البداية
        loadStores();
        renderCart();
    </script>
</body>
</html>
